scriptings:
  - generic:
      name: "world-cup-group-standings-widget"
      script_url: "https://raw.githubusercontent.com/vfelix7/rule_module_script/refs/heads/master/egern/scripts/WorldCup_Group_Standings_Widget.js?v=group-carousel-7s"
      timeout: 20

widgets:
  - name: "世界杯小组积分"
    script_name: "world-cup-group-standings-widget"
    # 默认使用 ESPN FIFA World Cup 积分来源，无需 API Key。
    # 默认每 7 秒自动轮播小组。
    # ROTATE_SECONDS 可调整轮播秒数；设置 GROUP 可固定显示某组。
    # 示例：
    # env:
    #   ROTATE_SECONDS: "7"
    #   # GROUP: "A"
